spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sivet_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET:sivet-super-secret-key-change-me-please-0123456789-abcdef}
    expiration-ms: 28800000
  cors:
    # Admite lista separada por comas. El origen de Netlify se añade siempre por defecto en SecurityConfig.
    allowed-origin: ${APP_CORS_ORIGIN:http://localhost:4200,https://idyllic-macaron-1fc871.netlify.app}